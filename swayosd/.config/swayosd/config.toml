[osd]
# Position: top-left, top-center, top-right, center-left, center, center-right, bottom-left, bottom-center, bottom-right
position = "bottom-center"
# Anchor: top, bottom, left, right, center
anchor = "bottom"
# Margin from edge in pixels
margin-top = 0
margin-bottom = 100
margin-left = 0
margin-right = 0

# Display timeout in milliseconds
timeout = 2000

# Style
background-color = "#1e1e2eF0"
border-color = "#89b4fa80"
border-size = 2
border-radius = 12

# Progress bar
bar-color = "#89b4fa"
bar-background-color = "#45475a"
bar-height = 12
bar-width = 300

# Icon settings
icon-size = 48
icon-spacing = 16

# Text
text-color = "#cdd6f4"
text-size = 16
font = "JetBrainsMono Nerd Font"