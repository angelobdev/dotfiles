# DO NOT EDIT THIS FILE, EDIT THE alacritty.base.toml INSTEAD!!!
[window]
padding = {x = 4, y = 4}

[font]
size=12
normal.family = "FiraCode NerdFont Mono"
bold.family = "FiraCode NerdFont Mono"
italic.family = "FiraCode NerdFont Mono"
bold_italic.family = "FiraCode NerdFont Mono"
[colors.primary]
background = '#151010'
foreground = '#c3c3c5'

[colors.cursor]
text = '#c3c3c5'
cursor = '#c3c3c5'

[colors.normal]
black   = '#151010'
red     = '#CC674B'
green   = '#B58E6B'
yellow  = '#DA9B68'
blue    = '#687B9B'
magenta = '#917A85'
cyan    = '#7387A5'
white   = '#c3c3c5'

[colors.bright]
black   = '#888889'
red     = '#CC674B'
green   = '#B58E6B'
yellow  = '#DA9B68'
blue    = '#687B9B'
magenta = '#917A85'
cyan    = '#7387A5'
white   = '#c3c3c5'
