##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps
windowrule {
  name = suppress-maximize

  suppress_event = maximize

  match:class = .*
}

# Fix dragging issues with XWayland
windowrule {
  name = xwayland-drag-fix

  no_focus = on

  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

#### SYSTEM APPLICATIONS ####

# Top Right Controls
windowrule {
  name = top-right-controls

  float = on
  size = (monitor_w*0.35) (monitor_h*0.5)
  move = (monitor_w*0.65-12) (56)
  stay_focused = on

  match:title = ^(Volume Control|Network Connections|Bluetooth Devices)$
}

# Zenity - float
windowrule {
  name = zenity

  float = on
  stay_focused = on
  dim_around = on

  match:class = ^(zenity)
}

# Picture-in-Picture
windowrule {
  name = firefox-pip

  pin = on
  float = on
  keep_aspect_ratio = on
  size = (monitor_h*0.02*16) (monitor_h*0.02*9)
  move = (monitor_w-monitor_h*0.02*16-12) (monitor_h*0.82-12)

  match:title = ^(Picture-in-Picture)$
}

# Wallpaper selector
windowrule {
  name = wallpaper-selector
  
  float = on
  size = (monitor_w*0.5) (monitor_h*0.5)
  center = on

  match:title = ^(Select a new Wallpaper)
}

#### CUSTOM APPLICATIONS ####

# Smile - float
windowrule {
  name = smile-float

  float = on

  match:title = ^(Smile)
}

# Calculator
windowrule {
  name = calculator
  
  float = on
  size = (monitor_w*0.25) (monitor_h*0.5)
  
  match:title = ^(Calculator)
}